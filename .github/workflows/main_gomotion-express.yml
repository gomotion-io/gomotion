name: Build & deploy container to Azure Web App (gomotion-express)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: gomotion-express
  ACR_LOGIN_SERVER: gomotionagent.azurecr.io
  AZURE_WEBAPP_NAME: gomotion-express
  RESOURCE_GROUP: gomotion
  ACR_NAME: gomotionagent             # e.g. myregistry
  IMAGE_NAME: gomotion-agent
  REGISTRY: gomotionagent.azurecr.io
  TAG: latest
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # (optional) Azure login with OIDC - useful for az CLI, not required for docker login
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AFF99E7577AC49C892BA8EA31F08DCA6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C5CD29FAED284C08846B0BC8E676824A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FB4DBCD52A37429FA432ACA549A95BC5 }}

      - name: ACR login via Azure token (no secrets)
        run: az acr login --name $ACR_NAME   # e.g. myregistry
        env:
          ACR_NAME: gomotionagent

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # - name: Update Web App to new image
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: ${{ env.APP_NAME }}
      #     images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
